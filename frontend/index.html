<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/vite.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover" />
    <title>ReVent — Re. In. Venting. Space.</title>
    <style>
      /* Ensure proper viewport height */
      :root { --vh: 1vh; }
      html, body { 
        height: 100%; 
        margin: 0; 
        padding: 0; 
        overflow: hidden; 
      }
    </style>
    <script>
      // Fix viewport height for mobile browsers
      (function() {
        function setVH() {
          var vh = window.innerHeight * 0.01;
          document.documentElement.style.setProperty('--vh', vh + 'px');
        }
        setVH();
        window.addEventListener('resize', setVH);
        window.addEventListener('orientationchange', setVH);
      })();
      
      // Block ALL programmatic page reload/navigation from Vite dev server
      // Vite 8 beta uses reload(), replace(), assign(), and direct assignment depending on reconnect state
      // Real navigation (Google auth etc.) is unaffected — only same-page reloads are blocked
      (function() {
        var currentUrl = window.location.href;
        var currentOrigin = window.location.origin;
        
        function isSamePageReload(url) {
          if (!url) return true;
          var urlStr = String(url);
          // Block if: no URL, same URL, same origin root, or Vite internal paths
          if (urlStr === currentUrl) return true;
          if (urlStr === currentOrigin || urlStr === currentOrigin + '/') return true;
          if (urlStr.includes('/@vite') || urlStr.includes('/@fs')) return true;
          if (urlStr === '/' || urlStr === '') return true;
          return false;
        }
        
        // Block location.reload()
        location.reload = function() {
          console.debug('[ReVent] Blocked location.reload()');
        };
        
        // Block location.replace() for same-page reloads
        var originalReplace = location.replace.bind(location);
        location.replace = function(url) {
          if (isSamePageReload(url)) {
            console.debug('[ReVent] Blocked location.replace()', url);
            return;
          }
          originalReplace(url);
        };
        
        // Block location.assign() for same-page reloads
        var originalAssign = location.assign.bind(location);
        location.assign = function(url) {
          if (isSamePageReload(url)) {
            console.debug('[ReVent] Blocked location.assign()', url);
            return;
          }
          originalAssign(url);
        };
        
        // Block window.location setter for same-page reloads
        var locationDescriptor = Object.getOwnPropertyDescriptor(window, 'location');
        if (locationDescriptor && locationDescriptor.set) {
          var originalSetter = locationDescriptor.set.bind(window);
          Object.defineProperty(window, 'location', {
            get: locationDescriptor.get,
            set: function(url) {
              if (isSamePageReload(url)) {
                console.debug('[ReVent] Blocked window.location assignment', url);
                return;
              }
              originalSetter(url);
            },
            configurable: true
          });
        }
      })();
      
      // Suppress Vite HMR WebSocket errors silently
      (function() {
        var OriginalWebSocket = window.WebSocket;
        window.WebSocket = function(url, protocols) {
          var ws = new OriginalWebSocket(url, protocols);
          if (url && (url.includes('vite') || url.includes('/@'))) {
            ws.addEventListener('error', function(e) { 
              e.stopPropagation(); 
              console.debug('[ReVent] Suppressed Vite WS error'); 
            });
            ws.addEventListener('close', function(e) {
              console.debug('[ReVent] Vite WS closed - this is normal');
            });
          }
          return ws;
        };
        window.WebSocket.prototype = OriginalWebSocket.prototype;
        window.WebSocket.CONNECTING = OriginalWebSocket.CONNECTING;
        window.WebSocket.OPEN = OriginalWebSocket.OPEN;
        window.WebSocket.CLOSING = OriginalWebSocket.CLOSING;
        window.WebSocket.CLOSED = OriginalWebSocket.CLOSED;
      })();
    </script>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.jsx"></script>
  </body>
</html>
