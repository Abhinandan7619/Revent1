<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/vite.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover" />
    <title>ReVent — Re. In. Venting. Space.</title>
    <style>
      /* Ensure proper viewport height */
      :root { --vh: 1vh; }
      html, body { 
        height: 100%; 
        margin: 0; 
        padding: 0; 
        overflow: hidden; 
      }
    </style>
    <script>
      // Fix viewport height for mobile browsers
      (function() {
        function setVH() {
          var vh = window.innerHeight * 0.01;
          document.documentElement.style.setProperty('--vh', vh + 'px');
        }
        setVH();
        window.addEventListener('resize', setVH);
        window.addEventListener('orientationchange', setVH);
      })();
      
      // Block programmatic reload from Vite dev server / Emergent proxy timeout
      (function() {
        location.reload = function() {
          console.debug('[ReVent] Blocked auto-reload (reload)');
        };
        var _origReplace = location.replace.bind(location);
        location.replace = function(url) {
          var s = String(url);
          if (s === window.location.href || s.includes('/@vite') || s.includes('node_modules/.vite')) {
            console.debug('[ReVent] Blocked auto-reload (replace)'); return;
          }
          _origReplace(url);
        };
        var _origAssign = location.assign.bind(location);
        location.assign = function(url) {
          var s = String(url);
          if (s === window.location.href || s.includes('/@vite') || s.includes('node_modules/.vite')) {
            console.debug('[ReVent] Blocked auto-reload (assign)'); return;
          }
          _origAssign(url);
        };
      })();

      // Suppress Vite HMR WebSocket errors silently
      (function() {
        var OriginalWebSocket = window.WebSocket;
        window.WebSocket = function(url, protocols) {
          var ws = new OriginalWebSocket(url, protocols);
          if (url && (url.includes('vite') || url.includes('/@'))) {
            ws.addEventListener('error', function(e) { 
              e.stopPropagation(); 
              console.debug('[ReVent] Suppressed Vite WS error'); 
            });
            ws.addEventListener('close', function(e) {
              console.debug('[ReVent] Vite WS closed - this is normal');
            });
          }
          return ws;
        };
        window.WebSocket.prototype = OriginalWebSocket.prototype;
        window.WebSocket.CONNECTING = OriginalWebSocket.CONNECTING;
        window.WebSocket.OPEN = OriginalWebSocket.OPEN;
        window.WebSocket.CLOSING = OriginalWebSocket.CLOSING;
        window.WebSocket.CLOSED = OriginalWebSocket.CLOSED;
      })();

      // Final defense: block ANY page unload/reload (including from filler.js)
      window.addEventListener('beforeunload', function(e) {
        console.debug('[ReVent] Blocked beforeunload event');
        e.preventDefault();
        e.returnValue = '';
        return '';
      }, true);
    </script>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.jsx"></script>
  </body>
</html>
