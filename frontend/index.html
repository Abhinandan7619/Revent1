<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/vite.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover" />
    <title>ReVent — Re. In. Venting. Space.</title>
    <style>
      /* Ensure proper viewport height on all browsers */
      :root {
        --vh: 1vh;
      }
      html, body {
        height: 100vh;
        height: calc(var(--vh, 1vh) * 100);
        margin: 0;
        padding: 0;
        overflow: hidden;
      }
    </style>
    <script>
      // Fix viewport height for mobile browsers with address bars
      function setVH() {
        var vh = window.innerHeight * 0.01;
        document.documentElement.style.setProperty('--vh', vh + 'px');
      }
      setVH();
      window.addEventListener('resize', setVH);
      window.addEventListener('orientationchange', setVH);
      
      // Prevent Vite HMR from causing page reloads in K8s environment
      (function() {
        'use strict';
        var userInitiated = false;
        var originalReload = window.location.reload.bind(window.location);
        
        Object.defineProperty(window.location, 'reload', {
          value: function() {
            if (userInitiated) {
              userInitiated = false;
              return originalReload();
            }
            console.info('[ReVent] Blocked automatic page reload');
          },
          writable: false,
          configurable: false
        });
        
        document.addEventListener('keydown', function(e) {
          if (e.key === 'F5' || (e.ctrlKey && e.key === 'r') || (e.metaKey && e.key === 'r')) {
            userInitiated = true;
          }
        });
        
        // Suppress Vite WebSocket errors
        var OriginalWebSocket = window.WebSocket;
        window.WebSocket = function(url, protocols) {
          var ws = new OriginalWebSocket(url, protocols);
          if (url && (url.includes('vite') || url.includes('/@'))) {
            Object.defineProperty(ws, 'onerror', {
              set: function() {},
              get: function() { return function() { console.debug('[ReVent] Suppressed WS error'); }; }
            });
            Object.defineProperty(ws, 'onclose', {
              set: function() {},
              get: function() { return function() { console.debug('[ReVent] Suppressed WS close'); }; }
            });
          }
          return ws;
        };
        window.WebSocket.prototype = OriginalWebSocket.prototype;
        window.WebSocket.CONNECTING = OriginalWebSocket.CONNECTING;
        window.WebSocket.OPEN = OriginalWebSocket.OPEN;
        window.WebSocket.CLOSING = OriginalWebSocket.CLOSING;
        window.WebSocket.CLOSED = OriginalWebSocket.CLOSED;
      })();
    </script>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.jsx"></script>
  </body>
</html>
