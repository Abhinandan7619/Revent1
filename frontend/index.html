<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/vite.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover" />
    <title>ReVent — Re. In. Venting. Space.</title>
    <style>
      /* Ensure proper viewport height */
      :root { --vh: 1vh; }
      html, body { 
        height: 100%; 
        margin: 0; 
        padding: 0; 
        overflow: hidden; 
      }
    </style>
    <script>
      // Fix viewport height for mobile browsers
      (function() {
        function setVH() {
          var vh = window.innerHeight * 0.01;
          document.documentElement.style.setProperty('--vh', vh + 'px');
        }
        setVH();
        window.addEventListener('resize', setVH);
        window.addEventListener('orientationchange', setVH);
      })();
      
      // Block programmatic page reload/navigation from Vite dev server
      // Note: This cannot stop reloads triggered by Emergent's filler.js blob scripts
      (function() {
        // Block location.reload()
        location.reload = function() {
          console.debug('[ReVent] Blocked location.reload()');
        };
        
        // Block location.replace() for same-page reloads
        var originalReplace = location.replace.bind(location);
        location.replace = function(url) {
          if (!url || url === window.location.href || url === '/' || String(url).includes('/@vite')) {
            console.debug('[ReVent] Blocked location.replace()', url);
            return;
          }
          originalReplace(url);
        };
        
        // Block location.assign() for same-page reloads
        var originalAssign = location.assign.bind(location);
        location.assign = function(url) {
          if (!url || url === window.location.href || url === '/' || String(url).includes('/@vite')) {
            console.debug('[ReVent] Blocked location.assign()', url);
            return;
          }
          originalAssign(url);
        };
      })();
      
      // Suppress Vite HMR WebSocket errors silently
      (function() {
        var OriginalWebSocket = window.WebSocket;
        window.WebSocket = function(url, protocols) {
          var ws = new OriginalWebSocket(url, protocols);
          if (url && (url.includes('vite') || url.includes('/@'))) {
            ws.addEventListener('error', function(e) { 
              e.stopPropagation(); 
              console.debug('[ReVent] Suppressed Vite WS error'); 
            });
            ws.addEventListener('close', function(e) {
              console.debug('[ReVent] Vite WS closed - this is normal');
            });
          }
          return ws;
        };
        window.WebSocket.prototype = OriginalWebSocket.prototype;
        window.WebSocket.CONNECTING = OriginalWebSocket.CONNECTING;
        window.WebSocket.OPEN = OriginalWebSocket.OPEN;
        window.WebSocket.CLOSING = OriginalWebSocket.CLOSING;
        window.WebSocket.CLOSED = OriginalWebSocket.CLOSED;
      })();
    </script>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.jsx"></script>
  </body>
</html>
